<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styling.css">
    <title>Sign Up Form</title>
</head>
<body>
<div class="container"> 
    <div class="form-card">   
    <h1>Sign Up</h1>
    <form id="postForm">

        <label for="name">Name</label><br>
        <input
            type="text"
            id="name"
            required
            minlength="2"
            maxlength="30"
            pattern="[A-Za-z ]+"
            title="Name can only contain letters"
        >
        <br><br>

        <label for="surname">Surname</label><br>
        <input
            type="text"
            id="surname"
            required
            minlength="2"
            maxlength="30"
            pattern="[A-Za-z ]+"
            title="Surname can only contain letters"
        >
        <br><br>

        <label for="email">Email</label><br>
        <input
            type="email"
            id="email"
            required
        >
        <br><br>

        <label for="confirmEmail">Confirm Email</label><br>
        <input
            type="email"
            id="confirmEmail"
            required
        >
        <br><br>

        <!-- <label for="body">Biography</label><br> 
        <textarea
            id="body"
            required
            minlength="10"
            maxlength="200"
        ></textarea>
        <br><br>-->

        <div class="button-group">
            <button type="submit">
                Sign Up
            </button>
            <button type="button" onclick="window.location.href='Index.html'">
            Home
        </button>
        </div>

    </form>
    </div>
</div>
    



    <script>

        document
            .getElementById("postForm")
            .addEventListener("submit", createPost);

        async function createPost(event) {

            event.preventDefault();

            const name =
                document.getElementById("name").value.trim();

            const surname =
                document.getElementById("surname").value.trim();

            const email =
                document.getElementById("email").value.trim();

            const confirmEmail =
                document.getElementById("confirmEmail").value.trim();

            //const body =
            //    document.getElementById("body").value.trim();

            // Name Validation
            if(name.length < 2){
                alert("Name must be at least 2 characters.");
                return;
            }

            // Surname Validation
            if(surname.length < 2){
                alert("Surname must be at least 2 characters.");
                return;
            }

            // Email Match Validation
            if(email !== confirmEmail){
                alert("Emails do not match.");
                return;
            }

            // Biography Validation
            //if(body.length < 10){
            //    alert("Biography must contain at least 10 characters.");
            //    return;
            //}

            try {

                const response = await fetch(
                    "https://jsonplaceholder.typicode.com/posts",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            name: name,
                            surname: surname,
                            email: email
                            //biography: body
                        })
                    }
                );

                const data = await response.json();

                console.log(data);

                alert("User Created Successfully!");

                document.getElementById("postForm").reset();

            }
            catch(error){

                console.error(error);

                alert("An error occurred while creating the user.");
            }
        }

    </script>

</body>
</html>
