<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>

    <link rel="stylesheet" href="css/styling.css">
    <script src="script/update.js"></script>
</head>
<body>

<div class="container">

    <div class="form-card">

        <h1>Edit User</h1>

        <form id="editForm">

            <label>Name</label>
            <input type="text"
                   id="name"
                   required
                   minlength="2">

            <label>Surname</label>
            <input type="text"
                   id="surname"
                   required
                   minlength="2">

            <label>Email</label>
            <input type="email"
                   id="email"
                   required>

            <label>Biography</label>
            <textarea id="body"
                      required
                      minlength="10"></textarea>

            <button type="submit">
                Update User
            </button>

        </form>

    </div>

</div>

<script src="script/edit.js"></script>

</body>
</html>
